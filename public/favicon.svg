<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep Night Navy -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    
    <!-- Kanban Card Gradient 1: Energetic Violet -->
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#5b21b6" />
    </linearGradient>

    <!-- Kanban Card Gradient 2: Bright Indigo -->
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Kanban Card Gradient 3: Completed Emerald -->
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Smooth Drop Shadows -->
    <filter id="shadowBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <!-- Base Rounded Container (App Icon Shape) -->
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)" />

  <!-- Inner Neon Plasma Glow -->
  <circle cx="256" cy="256" r="180" fill="#a78bfa" fill-opacity="0.15" filter="blur(40px)" />

  <!-- Left Column (Pending/Todo) -->
  <rect x="115" y="240" width="76" height="152" rx="38" fill="url(#card1)" filter="url(#shadowBlur)" />
  
  <!-- Middle Column (In-Progress) - The tallest to form the T visual weight -->
  <rect x="218" y="140" width="76" height="252" rx="38" fill="url(#card2)" filter="url(#shadowBlur)" />
  
  <path d="M236 266 L252 284 L280 240" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Right Column (Completed) -->
  <rect x="321" y="200" width="76" height="192" rx="38" fill="url(#card3)" filter="url(#shadowBlur)" />

  <!-- Top swoosh representing flow/motion -->
  <path d="M153 180 Q256 120 359 180" stroke="#c4b5fd" stroke-width="12" stroke-linecap="round" fill="none" stroke-dasharray="1 12" />
</svg>
